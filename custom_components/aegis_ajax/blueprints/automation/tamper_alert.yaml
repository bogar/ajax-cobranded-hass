blueprint:
  name: Ajax Tamper Alert
  description: >-
    Send a critical notification when a tamper event is detected on any
    Ajax device, including the device name and type.
  domain: automation
  input:
    event_entity:
      name: Security Event Entity
      description: The Ajax security event entity to monitor.
      selector:
        entity:
          filter:
            domain: event
    notify_service:
      name: Notification Service
      description: The notification service to call (e.g. notify.mobile_app_phone).
      selector:
        text: {}

triggers:
  - trigger: state
    entity_id: !input event_entity

conditions:
  - condition: template
    value_template: >-
      {{ trigger.to_state.attributes.event_type is defined
         and trigger.to_state.attributes.event_type == 'tamper' }}

actions:
  - action: !input notify_service
    data:
      title: "TAMPER ALERT"
      message: >-
        Device tampered: {{ trigger.to_state.attributes.get('device_name', 'Unknown device') }}
        {% set dtype = trigger.to_state.attributes.get('device_type', '') %}
        {% if dtype %}({{ dtype | replace('_', ' ') | title }}){% endif %}
        {% set room = trigger.to_state.attributes.get('room_name', '') %}
        {% if room %} in {{ room }}{% endif %}
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0
        tag: "ajax-tamper-{{ trigger.to_state.attributes.get('device_name', 'unknown') | slugify }}"
        priority: high
        ttl: 0
